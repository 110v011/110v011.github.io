<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>log.html</title>
<style>
  body {
    background: #111;
    color: #ddd;
    font-family: monospace;
    padding: 40px;
    line-height: 1.7;
    transition: background 1s;
    overflow: hidden;
  }

  .line { opacity: 0.85; }

  .hidden {
    opacity: 0;
    transition: opacity 1.5s;
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: #ddd;
    animation: blink 1s steps(1) infinite;
    vertical-align: -2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .line:hover {
    color: #f55;
    cursor: pointer;
  }

  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(2px, -2px); }
    40% { transform: translate(-2px, 2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(-2px, -2px); }
    100% { transform: translate(0,0); }
  }

  /* 白フラッシュ */
  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 10;
  }

  /* フラッシュ後の幻視テキスト */
  #afterimage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #f55;
    font-size: 2rem;
    opacity: 0;
    pointer-events: none;
    z-index: 9;
    transition: opacity 0.1s;
  }

  /* 画面端の影 */
  #shadow {
    position: fixed;
    width: 80px;
    height: 160px;
    background: rgba(0,0,0,0.7);
    border-radius: 40px;
    bottom: 0;
    right: -120px;
    opacity: 0;
    transition: opacity 0.2s, right 0.2s;
    z-index: 8;
  }

  #type-area {
    margin-top: 20px;
    white-space: pre-wrap;
  }

  #secret {
    margin-top: 20px;
    opacity: 0;
    transition: opacity 2s;
    color: white;
  }

.afterimgsrc {
  border: none;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<div class="line">loading log…</div>
<div class="line">.</div>
<div class="line">..</div>
<div class="line">...</div>

<div class="line">[00:00:01] status: ok</div>
<div class="line">[00:00:02] source: undefined</div>
<div class="line">[00:00:03] note: "このページを開いた理由は記録されていません"</div>
<div class="line">[00:00:05] trace: "視線を検出"</div>
<div class="line">[00:00:06] warning: "まだ閉じないで"</div>

<br>

<div class="line">> waiting<span class="cursor"></span></div>

<div id="type-area"></div>

<div id="secret">……見つけたね。<br>……見てはいけないものを。<br><font color="red">もうここからは出られない</font></div>

<div id="flash"></div>
<div id="afterimage"><img class="afterimgsrc" src="image2.jpg"></img></div>
<div id="shadow"></div>

<script>
  // 時間差で隠し行
  const hiddenLines = [
    '[00:00:12] system: "背後を確認しましたか？"',
    '[00:00:15] system: "あなたの端末ではありません"',
    '[00:00:18] system: "接続は切れません"'
  ];

  let index = 0;
  function revealLine() {
    if (index >= hiddenLines.length) return;
    const div = document.createElement("div");
    div.className = "line hidden";
    div.textContent = hiddenLines[index++];
    document.body.insertBefore(div, document.getElementById("secret"));
    setTimeout(() => div.style.opacity = 1, 100);
  }

  setTimeout(revealLine, 3000);
  setTimeout(revealLine, 6000);
  setTimeout(revealLine, 9000);

  // ランダム揺れ
  setInterval(() => {
    if (Math.random() < 0.1) {
      document.body.style.animation = "shake 0.4s";
      setTimeout(() => document.body.style.animation = "", 400);
    }
  }, 2000);

  // クリックで秘密
  document.body.addEventListener("click", () => {
    document.getElementById("secret").style.opacity = 1;
  });

  // タイピング風
  const message = 'visitor@local:~$ whoami\n"あなたではありません"\n';
  let pos = 0;

  function typeWriter() {
    const area = document.getElementById("type-area");
    area.textContent = message.slice(0, pos++);
    if (pos <= message.length) {
      setTimeout(typeWriter, 80 + Math.random() * 120);
    } else {
      triggerFlash();
    }
  }

  setTimeout(typeWriter, 5000);

  // 白フラッシュ＋幻視
  function triggerFlash() {
    const flash = document.getElementById("flash");
    const after = document.getElementById("afterimage");

    flash.style.opacity = 1;

    setTimeout(() => {
      flash.style.opacity = 0;

      // フラッシュ直後に一瞬だけ別の文
      after.style.opacity = 1;
      setTimeout(() => after.style.opacity = 0, 900);

    }, 150);
  }

  // 画面端の影（ランダム出現）
  function showShadow() {
    const shadow = document.getElementById("shadow");
    shadow.style.opacity = 1;
    shadow.style.right = "10px";

    setTimeout(() => {
      shadow.style.opacity = 0;
      shadow.style.right = "-120px";
    }, 400);
  }

  setInterval(() => {
    if (Math.random() < 0.07) showShadow();
  }, 2500);
</script>

</body>
</html>
